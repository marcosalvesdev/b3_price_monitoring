{% extends 'base.html' %}

{% block content %}
<h2>Log In</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
    <p>Don't have an account? <a href="{% url 'accounts:register' %}">Register here</a></p>
    <p>Forgot your password? <a href="{% url 'accounts:password_reset' %}">Reset it here</a></p>
</form>
{% endblock %}
