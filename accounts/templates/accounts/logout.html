{% extends "base_auth.html" %}

{% block title %}Logged Out — B3 Monitor{% endblock %}

{% block content %}
<main class="d-flex flex-column justify-content-center min-vh-100 py-5">
    <section>
        <div class="container">
            <div class="row mb-8">
                <div class="col-xl-4 offset-xl-4 col-md-12 col-12">
                    <div class="text-center">
                        <a href="{% url 'accounts:login' %}" class="fs-2 fw-bold d-flex align-items-center gap-2 justify-content-center mb-6 text-decoration-none">
                            <i class="ti ti-chart-line"></i>
                            <span>B3 Monitor</span>
                        </a>
                        <h1 class="mb-1">Logged Out</h1>
                        <p class="mb-0 text-secondary">You have successfully logged out of your account.</p>
                    </div>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col-xl-5 col-lg-6 col-md-8 col-12">
                    <div class="card card-lg mb-6">
                        <div class="card-body p-6">
                            <div class="d-grid mb-4">
                                <a href="{% url 'accounts:login' %}" class="btn btn-primary">Sign In Again</a>
                            </div>
                            <div class="text-center">
                                <a href="{% url 'assets:list' %}">
                                    <span>Return to Home</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
{% endblock %}
