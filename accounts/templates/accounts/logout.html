{% extends "base.html" %}

{% block title %}<title>Logged Out — B3 Monitor</title>{% endblock %}

{% block content %}
<main class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="w-100" style="max-width: 480px;">
        <h2 class="fw-semibold mb-4 text-center">Logged Out</h2>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 text-center">
                <p class="mb-4">You have successfully logged out of your account.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-dark w-100">Sign In Again</a>
                <p class="text-muted mt-3 mb-0">
                    Or <a href="{% url 'assets:list' %}">return to Home</a>
                </p>
            </div>
        </div>
    </div>
</main>
{% endblock %}
