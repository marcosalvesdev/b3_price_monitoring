{% extends 'base.html' %}

{% block title %}<title>Email Sent — B3 Monitor</title>{% endblock %}

{% block content %}
<main class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="w-100" style="max-width: 480px;">
        <h2 class="fw-semibold mb-4 text-center">Check Your Email</h2>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 text-center">
                <p class="mb-4">We've sent an email with instructions to reset your password. Please check your inbox and follow the link.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-dark w-100">Back to Sign In</a>
            </div>
        </div>
    </div>
</main>
{% endblock %}
