{% extends 'base.html' %}

{% block title %}<title>Reset Password — B3 Monitor</title>{% endblock %}

{% block content %}
<main class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="w-100" style="max-width: 480px;">
        <h2 class="fw-semibold mb-4 text-center">Reset Password</h2>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <p class="text-muted mb-4">Enter your email address and we'll send you a link to reset your password.</p>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label">Email</label>
                        <input type="email" name="email" id="id_email" class="form-control" placeholder="Enter your email address" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Send Reset Link</button>
                </form>
                <p class="text-center text-muted mt-3 mb-0">
                    <a href="{% url 'accounts:login' %}">Back to Sign In</a>
                </p>
            </div>
        </div>
    </div>
</main>
{% endblock %}
