{% extends 'base.html' %}

{% block content %}
<h1>Tunnel List</h1>
<h3><a href="{% url 'tunnels:create' %}">Create a new Tunnel</a></h3>
<ul>
    {% for tunnel in tunnels %}
    <li>{{ tunnel.asset.name }}'s tunnel |
        <a href="{% url 'tunnels:detail' tunnel.id %}">View</a> |
        <a href="{% url 'tunnels:update' tunnel.id %}">Edit</a> |
        <a href="{% url 'tunnels:delete' tunnel.id %}">Delete</a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
