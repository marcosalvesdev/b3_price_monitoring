repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python]

      - id: ruff-format
        types_or: [python]

  - repo: local
    hooks:
    - id: run-tests
      name: Run project tests
      entry: docker compose exec web python manage.py test -v 2 --keepdb --failfast
      language: system
      pass_filenames: false
      always_run: true
      stages: [push]

