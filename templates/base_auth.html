{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Color modes (before CSS to prevent FOUC) -->
    <script src="{% static 'js/vendors/color-modes.js' %}"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap">
    <!-- Libs CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.45.0/tabler-icons.min.css">
    <!-- Theme CSS -->
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    {% block head %}{% endblock %}
    <title>{% block title %}B3 Monitor{% endblock %}</title>
</head>
<body>
    {% include "partials/_messages.html" %}

    {% block content %}{% endblock %}

    <!-- Libs JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Theme JS -->
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/vendors/password.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
