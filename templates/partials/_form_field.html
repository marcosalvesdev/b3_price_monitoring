<div class="mb-3">
    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}
        <div class="invalid-feedback d-block">
            {% for error in field.errors %}{{ error }}{% endfor %}
        </div>
    {% endif %}
    {% if field.help_text %}
        <a class="form-text text-decoration-none d-inline-flex align-items-center gap-1 mt-1"
           data-bs-toggle="collapse"
           href="#help_{{ field.id_for_label }}"
           role="button"
           aria-expanded="false"
           aria-controls="help_{{ field.id_for_label }}">
            <i class="ti ti-info-circle"></i> Instructions
        </a>
        <div class="collapse" id="help_{{ field.id_for_label }}">
            <div class="form-text mt-1">{{ field.help_text }}</div>
        </div>
    {% endif %}
</div>
